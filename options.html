<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BetterPrompts Settings</title>
  <style>
    /* Inter Font Import */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --border: #e2e8f0;
      --success: #10b981;
      --radius: 12px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      display: flex;
      justify-content: center;
      padding: 60px 20px;
      color: var(--text-primary);
      margin: 0;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
      max-width: 480px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .header-area {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-area img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }

    h2 { margin: 0; font-size: 24px; color: var(--text-primary); }
    
    .guide {
      background: rgba(99, 102, 241, 0.05);
      border-left: 4px solid var(--accent);
      padding: 20px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-bottom: 30px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-secondary);
    }
    .guide a { color: var(--accent); text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .guide a:hover { color: var(--accent-hover); text-decoration: underline; }
    .guide ol { margin: 12px 0 0 0; padding-left: 20px; color: var(--text-primary); }
    .guide li { margin-bottom: 6px; }
    .guide strong { color: var(--text-primary); }
    
    .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    label { font-size: 14px; font-weight: 600; color: var(--text-primary); }
    input {
      padding: 14px 16px;
      font-size: 15px;
      background: #ffffff;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: var(--radius);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      transition: all 0.2s;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2); }
    
    .actions { display: flex; align-items: center; gap: 16px; }
    button {
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: var(--accent-hover); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    
    #status {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--success);
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #status.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header-area">
      <img src="icons/icon.png" alt="BetterPrompts Logo">
      <h2>Extension Settings</h2>
    </div>
    
    <div class="guide">
      <strong>How to get your free Gemini API key:</strong>
      <ol>
        <li>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.</li>
        <li>Sign in with your Google account.</li>
        <li>Click <strong>"Create API key"</strong> and copy it.</li>
      </ol>
    </div>

    <div class="input-group">
      <label for="apiKeyInput">Gemini API Key</label>
      <input type="password" id="apiKeyInput" placeholder="AIzaSy...">
    </div>
    
    <div class="actions">
      <button id="saveBtn">Save Configuration</button>
      <span id="status">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        Saved successfully
      </span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
